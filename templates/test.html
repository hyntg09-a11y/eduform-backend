{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Vocacional — EduForm</title>
  <link rel="stylesheet" href="{% static 'css/eduform.css' %}">
</head>
<body>
<div class="modal-overlay active">
  <div class="modal-test">

    <button class="close-btn" onclick="window.location='/'">×</button>

    <h2 id="titulo-step">Encuesta Socioeconómica</h2>

    <div class="progress-container">
      <div class="progress-bar" id="barra" style="width: 0%"></div>
    </div>
    <p class="progress-text" id="progreso-texto">Pregunta 1 de {{ total }}</p>

    <form method="POST" action="{% url 'test' %}" id="form-test">
      {% csrf_token %}
      <input type="hidden" name="step" id="input-step" value="{{ step }}"/>
      <input type="hidden" name="index" id="input-index" value="{{ index }}"/>

      <!-- Respuestas previas guardadas -->
      {% for key, val in respuestas_previas.items %}
        <input type="hidden" name="prev_{{ key }}" value="{{ val }}"/>
      {% endfor %}

      <div class="test-body">
        <div class="question-card">
          <label class="question-title">{{ pregunta.pregunta }}</label>
          <select name="respuesta_{{ pregunta.id }}" required>
            <option value="">Seleccione una opción</option>
            {% for opcion in pregunta.opciones %}
              <option value="{{ opcion }}">{{ opcion }}</option>
            {% endfor %}
          </select>
          {% if error %}
            <p class="error-text">{{ error }}</p>
          {% endif %}
        </div>
      </div>

      <div class="modal-buttons">
        <button type="submit" name="accion" value="atras"
          {% if step == 1 and index == 0 %}disabled{% endif %}
          style="background:#6c757d;">
          Atrás
        </button>
        <button type="submit" name="accion" value="siguiente" style="background:#004aad; color:white;">
          {% if es_ultimo %}Finalizar test{% else %}Siguiente{% endif %}
        </button>
      </div>
    </form>

  </div>
</div>

<script>
  const totalPreguntas = {{ total }};
  const indexActual = {{ index }};
  const progreso = Math.round(((indexActual + 1) / totalPreguntas) * 100);
  document.getElementById('barra').style.width = progreso + '%';
  document.getElementById('progreso-texto').textContent =
    'Pregunta ' + (indexActual + 1) + ' de ' + totalPreguntas;
  {% if step == 2 %}
  document.getElementById('titulo-step').textContent = 'Test Vocacional';
  {% endif %}
</script>
</body>
</html>
